<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lucky Number</title>

<style>
body{
    background:#f5f5f5;
    font-family:Arial,sans-serif;
    text-align:center;
    padding:30px;
}

.card{
    background:white;
    max-width:350px;
    margin:auto;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

button{
    background:#2196F3;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:10px;
    font-size:18px;
}
</style>

</head>

<body>

<div class="card">

<h1>🔢 Lucky Number</h1>

<input
id="name"
type="text"
placeholder="Enter Your Name"
style="width:90%;padding:10px;margin:10px;border-radius:8px;">

<br>

<input
id="dob"
type="date"
style="width:90%;padding:10px;margin:10px;border-radius:8px;">

<br>

<button onclick="generateNumber()">
Generate Lucky Number
</button>

<h2 id="result"></h2>

<p id="message"></p>
<script>
function generateNumber(){

let name = document.getElementById("name").value;

let number = Math.floor(Math.random()*9000000)+1000000;

document.getElementById("result").innerHTML = number;

document.getElementById("message").innerHTML =
"Congratulations " + name + "! Your lucky number is " + number;
const numerology = {
  1: {
    color: "Red",
    day: "Sunday",
    remedy: "Offer water to the Sun."
  },
  2: {
    color: "White",
    day: "Monday",
    remedy: "Meditate for 10 minutes."
  },
  11: {
    color: "Silver",
    day: "Monday",
    remedy: "Trust your intuition and stay calm."
  }
};

}
</script>
</body>
</html>
