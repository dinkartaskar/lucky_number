<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lucky Number</title>

<style>
body{
    background:#f5f5f5;
    font-family:Arial,sans-serif;
    text-align:center;
    padding:30px;
}

.card{
    background:white;
    max-width:350px;
    margin:auto;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

button{
    background:#2196F3;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:10px;
    font-size:18px;
}
</style>

</head>

<body>

<div class="card">

<h1>🔢 Lucky Number</h1>

<input
id="name"
type="text"
placeholder="Enter Your Name"
style="width:90%;padding:10px;margin:10px;border-radius:8px;">

<br>

<input
id="dob"
type="date"
style="width:90%;padding:10px;margin:10px;border-radius:8px;">

<br>

<button onclick="generateNumber()">
Generate Lucky Number
</button>

<h2 id="result"></h2>

<p id="message"></p>
<script>
function generateNumber() {

let name = document.getElementById("name").value;
let dob = document.getElementById("dob").value;

if(name=="" || dob==""){
alert("Please enter Name and Date of Birth");
return;
}

let digits = dob.replaceAll("-","");

let total = 0;

for(let i=0;i<digits.length;i++){
total += Number(digits[i]);
}

document.getElementById("result").innerHTML = total;

document.getElementById("message").innerHTML =
"Hello " + name + "<br>Your Birth Number is " + total;
    let root = total;

while (root > 9 && root != 11 && root != 22 && root != 33) {

let sum = 0;

root.toString().split("").forEach(function(n){
sum += Number(n);
});

root = sum;

}
    let info = numerology[root];

if (info) {
  document.getElementById("message").innerHTML =
  `
  Hello ${name}<br>
  Birth Number : ${total}<br>
  Root Number : ${root}<br><br>

  🎨 Lucky Color : ${info.color}<br>
  📅 Lucky Day : ${info.day}<br>
  🪔 Remedy : ${info.remedy}
  `;
    }

document.getElementById("result").innerHTML = root;

document.getElementById("message").innerHTML =
"Hello " + name +
"<br>Birth Number : " + total +
"<br>Root Number : " + root;

    }
   const numerology = {
  1: {
    color: "Red",
    day: "Sunday",
    remedy: "Offer water to the Sun."
  },
  2: {
    color: "White",
    day: "Monday",
    remedy: "Meditate for 10 minutes."
  },
  11: {
    color: "Silver",
    day: "Monday",
    remedy: "Trust your intuition and stay calm."
  }
}; 
</script>
</body>
</html>
